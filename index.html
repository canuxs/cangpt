<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanGPT U1 | Llama 3.3</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #0b0b0b; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        #main { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 85%; padding: 12px 20px; border-radius: 15px; line-height: 1.6; position: relative; word-wrap: break-word; }
        .user { align-self: flex-end; background: #222; border: 1px solid #333; }
        .ai { align-self: flex-start; background: #001a33; color: #99ccff; border: 1px solid #004080; }
        .img-container { margin-top: 10px; background: #111; border-radius: 10px; padding: 15px; border: 1px solid #333; text-align: center; }
        img { width: 100%; max-width: 500px; border-radius: 8px; margin-top: 10px; display: none; }
        #input-container { padding: 25px; border-top: 1px solid #222; display: flex; gap: 12px; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; outline: none; }
        .nav-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; cursor: pointer; text-align: left; }
        .nav-btn:hover { background: #333; border-color: #0074d9; }
        #send-btn { background: #0074d9; border: none; padding: 0 30px; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:#0074d9; margin:0;">CanGPT U1</h2>
    <button class="nav-btn" onclick="location.reload()">🗑 Sohbeti Sıfırla</button>
    <button class="nav-btn" onclick="saveChat()">💾 Sohbeti Kaydet</button>
    <hr style="border:0; border-top:1px solid #222; width:100%;">
    <div id="records-list" style="display:flex; flex-direction:column; gap:5px;">
        <small style="color:#555;">GEÇMİŞ KAYITLAR</small>
    </div>
</div>

<div id="main">
    <div id="chat"><div class="bubble ai">Selam Can Bartu! Bugün ne yapıyoruz?</div></div>
    <div id="input-container">
        <input type="text" id="userInput" placeholder="Mesaj yaz veya görsel iste..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">GÖNDER</button>
    </div>
</div>

<script>
    let chatHistory = [];

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        addBubble(text, 'user');
        input.value = "";
        chatHistory.push({ role: "user", content: text });

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ history: chatHistory })
            });
            const data = await res.json();
            
            if (data.text) {
                if (data.text.includes("GÖRSEL_OLUŞTUR:")) {
                    const prompt = data.text.split("GÖRSEL_OLUŞTUR:")[1].trim();
                    const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random()*999999)}`;
                    addImageBubble(imgUrl, prompt);
                } else {
                    addBubble(data.text, 'ai');
                }
                chatHistory.push({ role: "assistant", content: data.text });
            }
        } catch (err) { addBubble("❌ Bir hata oluştu.", 'ai'); }
    }

    function addBubble(text, sender) {
        const div = document.createElement("div");
        div.className = `bubble ${sender}`;
        div.innerHTML = sender === 'ai' ? marked.parse(text) : text;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function addImageBubble(url, desc) {
        const div = document.createElement("div");
        div.className = "bubble ai";
        div.innerHTML = `
            <div class="img-container">
                <p>🎨 <b>${desc}</b> çiziliyor...</p>
                <img src="${url}" style="display:none;" 
                     onload="this.style.display='block'; this.previousElementSibling.innerHTML='✅ Hazır:';" 
                     onerror="this.parentElement.innerHTML='⚠️ Görsel yüklenemedi, lütfen tekrar dene.';">
                <br><a href="${url}" target="_blank" style="color:#0074d9; text-decoration:none; font-weight:bold; font-size:12px;">📥 Tam Boyut Gör / İndir</a>
            </div>`;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function saveChat() {
        const content = document.getElementById("chat").innerHTML;
        const time = new Date().toLocaleString();
        let saves = JSON.parse(localStorage.getItem("cangpt_saves") || "[]");
        saves.push({ time, content });
        localStorage.setItem("cangpt_saves", JSON.stringify(saves));
        renderSaves();
        alert("Sohbet kaydedildi!");
    }

    function renderSaves() {
        const list = document.getElementById("records-list");
        const saves = JSON.parse(localStorage.getItem("cangpt_saves") || "[]");
        list.innerHTML = '<small style="color:#555;">GEÇMİŞ KAYITLAR</small>';
        saves.reverse().forEach((s, i) => {
            const btn = document.createElement("button");
            btn.className = "nav-btn";
            btn.style.fontSize = "11px";
            btn.innerText = "💾 " + s.time;
            btn.onclick = () => { document.getElementById("chat").innerHTML = s.content; };
            list.appendChild(btn);
        });
    }

    window.onload = renderSaves;
</script>
</body>
</html>
