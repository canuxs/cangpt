<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CanGPT U1 | Llama 3.3</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 260px; background: #0b0b0b; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 10px; line-height: 1.5; }
        .user { align-self: flex-end; background: #333; }
        .ai { align-self: flex-start; background: #001f3f; border: 1px solid #0074d9; }
        .img-box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        img { width: 100%; border-radius: 5px; display: none; margin-top: 10px; }
        #input-area { padding: 20px; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #111; color: #fff; border: 1px solid #333; border-radius: 5px; }
        button { padding: 10px 20px; background: #0074d9; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="color:#0074d9;">CanGPT U1</h3>
    <button onclick="saveChat()">💾 Kaydet</button>
    <button onclick="location.reload()">🗑 Sıfırla</button>
    <div id="save-list" style="margin-top:20px; font-size:12px;"></div>
</div>

<div id="main" style="flex-grow:1; display:flex; flex-direction:column;">
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">GÖNDER</button>
    </div>
</div>

<script>
    let chatHistory = [];

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if(!text) return;

        addBubble(text, 'user');
        input.value = "";
        chatHistory.push({ role: "user", content: text });

        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ history: chatHistory })
        });
        const data = await res.json();
        
        if(data.text.includes("GÖRSEL_OLUŞTUR:")) {
            const prompt = data.text.split("GÖRSEL_OLUŞTUR:")[1].trim();
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true&seed=${Math.random()}`;
            addImageBubble(url, prompt);
        } else {
            addBubble(data.text, 'ai');
        }
        chatHistory.push({ role: "assistant", content: data.text });
    }

    function addBubble(text, sender) {
        const div = document.createElement("div");
        div.className = `bubble ${sender}`;
        div.innerHTML = sender === 'ai' ? marked.parse(text) : text;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function addImageBubble(url, desc) {
        const div = document.createElement("div");
        div.className = "bubble ai";
        div.innerHTML = `
            <div class="img-box">
                <p>🎨 <b>${desc}</b> çiziliyor...</p>
                <img src="${url}" onload="this.style.display='block'; this.previousElementSibling.innerHTML='✅ Hazır:';" 
                     onerror="this.parentElement.innerHTML='⚠️ Yükleme hatası. Sayfayı yenileyip tekrar deneyin.';">
                <br><a href="${url}" target="_blank" style="color:#0074d9; font-size:12px;">📥 Görseli Aç</a>
            </div>`;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function saveChat() {
        const chat = document.getElementById("chat").innerHTML;
        let saves = JSON.parse(localStorage.getItem("cangpt_saves") || "[]");
        saves.push({ date: new Date().toLocaleString(), html: chat });
        localStorage.setItem("cangpt_saves", JSON.stringify(saves));
        renderSaves();
    }

    function renderSaves() {
        const list = document.getElementById("save-list");
        const saves = JSON.parse(localStorage.getItem("cangpt_saves") || "[]");
        list.innerHTML = "<b>KAYITLAR</b>";
        saves.reverse().forEach(s => {
            const d = document.createElement("div");
            d.style.cssText = "cursor:pointer; padding:5px; border-bottom:1px solid #222;";
            d.innerText = "💾 " + s.date;
            d.onclick = () => document.getElementById("chat").innerHTML = s.html;
            list.appendChild(d);
        });
    }
    window.onload = renderSaves;
</script>
</body>
</html>
