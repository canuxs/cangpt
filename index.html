<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanGPT U1 | Llama 3.3</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #0b0b0b; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #main { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 85%; padding: 12px 20px; border-radius: 15px; line-height: 1.6; }
        .user { align-self: flex-end; background: #222; border: 1px solid #333; }
        .ai { align-self: flex-start; background: #001a33; color: #99ccff; border: 1px solid #004080; }
        .img-container { margin-top: 10px; background: #111; border-radius: 10px; padding: 15px; border: 1px solid #333; text-align: center; }
        .gen-image { width: 100%; max-width: 450px; border-radius: 8px; margin: 10px auto; display: block; }
        .dl-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #0066cc; color: #fff !important; border-radius: 8px; text-decoration: none; font-weight: bold; }
        #input-container { padding: 25px; border-top: 1px solid #222; display: flex; gap: 12px; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; outline: none; }
        button { background: #0066cc; color: #fff; border: none; padding: 0 30px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:#4dabf7">CanGPT U1</h2>
    <button onclick="location.reload()" style="background:#1a1a1a; color:white; padding:10px; cursor:pointer; border-radius:8px; border:1px solid #333;">🗑 Temizle</button>
</div>

<div id="main">
    <div id="chat"><div class="bubble ai">Selam Can Bartu! Bugün ne yapıyoruz?</div></div>
    <div id="input-container">
        <input type="text" id="userInput" placeholder="Mesajını yaz veya görsel iste..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">GÖNDER</button>
    </div>
</div>

<script>
    let chatHistory = [];

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        addBubble(text, 'user');
        input.value = "";
        chatHistory.push({ role: "user", content: text });

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ history: chatHistory })
            });
            const data = await res.json();
            
            if (data.text) {
                if (data.text.includes("GÖRSEL_OLUŞTUR:")) {
                    const prompt = data.text.split("GÖRSEL_OLUŞTUR:")[1].trim();
                    const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random()*999)}`;
                    addImageBubble(imgUrl, prompt);
                } else {
                    addBubble(data.text, 'ai');
                }
                chatHistory.push({ role: "assistant", content: data.text });
            }
        } catch (err) { addBubble("Hata oluştu.", 'ai'); }
    }

    function addBubble(text, sender) {
        const div = document.createElement("div");
        div.className = `bubble ${sender}`;
        div.innerHTML = sender === 'ai' ? marked.parse(text) : text;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function addImageBubble(url, desc) {
        const div = document.createElement("div");
        div.className = "bubble ai";
        // Proxy URL Kullanımı
        const proxyUrl = `/proxy-image?url=${encodeURIComponent(url)}`;
        div.innerHTML = `
            <div class="img-container">
                <p>🎨 <b>${desc}</b> hazırlanıyor...</p>
                <img src="${proxyUrl}" class="gen-image" onload="this.previousElementSibling.innerHTML='✅ Hazır:';" onerror="this.nextElementSibling.innerText='⚠️ Hata oluştu.'">
                <br><a href="${proxyUrl}" target="_blank" download="cangpt.png" class="dl-btn">📥 İndir</a>
            </div>`;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }
</script>
</body>
</html>
