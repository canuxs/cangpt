<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanGPT U1 | Llama 3.3</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 260px; background: #0b0b0b; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        #main { flex-grow: 1; display: flex; flex-direction: column; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 10px; line-height: 1.5; }
        .user { align-self: flex-end; background: #333; }
        .ai { align-self: flex-start; background: #001f3f; border: 1px solid #0074d9; }
        .img-box { margin-top: 10px; background: #111; padding: 10px; border-radius: 8px; text-align: center; }
        img { max-width: 100%; border-radius: 5px; margin-top: 5px; }
        #input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex-grow: 1; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; background: #0074d9; color: #fff; border: none; }
        .save-btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; margin-bottom: 5px; text-align: left; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="color: #0074d9;">CanGPT U1</h3>
    <button onclick="saveChat()">💾 Sohbeti Kaydet</button>
    <button onclick="clearChat()">🗑 Sıfırla</button>
    <div id="records-list"></div>
</div>

<div id="main">
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Mesaj yazın..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Gönder</button>
    </div>
</div>

<script>
    let chatHistory = [];

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if(!text) return;

        addBubble(text, 'user');
        input.value = "";
        chatHistory.push({ role: "user", content: text });

        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ history: chatHistory })
        });
        const data = await res.json();
        
        if(data.text.includes("GÖRSEL_OLUŞTUR:")) {
            const prompt = data.text.split("GÖRSEL_OLUŞTUR:")[1].trim();
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
            addImageBubble(url, prompt);
        } else {
            addBubble(data.text, 'ai');
        }
        chatHistory.push({ role: "assistant", content: data.text });
    }

    function addBubble(text, sender) {
        const div = document.createElement("div");
        div.className = `bubble ${sender}`;
        div.innerHTML = sender === 'ai' ? marked.parse(text) : text;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function addImageBubble(url, desc) {
        const div = document.createElement("div");
        div.className = "bubble ai";
        const proxyUrl = `/proxy-image?url=${encodeURIComponent(url)}`;
        div.innerHTML = `
            <div class="img-box">
                <p>🎨 <b>${desc}</b></p>
                <img src="${proxyUrl}" onload="this.style.display='block'" onerror="this.src='https://via.placeholder.com/400?text=Hata'">
                <br><a href="${proxyUrl}" target="_blank" style="color:#0074d9; font-size:12px;">Tam Boyut</a>
            </div>`;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function saveChat() {
        const content = document.getElementById("chat").innerHTML;
        const saves = JSON.parse(localStorage.getItem("cangpt_saves") || "[]");
        saves.push({ date: new Date().toLocaleString(), content });
        localStorage.setItem("cangpt_saves", JSON.stringify(saves));
        loadSaves();
    }

    function loadSaves() {
        const list = document.getElementById("records-list");
        list.innerHTML = "<h4>Kayıtlar:</h4>";
        const saves = JSON.parse(localStorage.getItem("cangpt_saves") || "[]");
        saves.forEach((s, i) => {
            const btn = document.createElement("button");
            btn.className = "save-btn";
            btn.innerText = s.date;
            btn.onclick = () => { document.getElementById("chat").innerHTML = s.content; };
            list.appendChild(btn);
        });
    }

    function clearChat() {
        document.getElementById("chat").innerHTML = "";
        chatHistory = [];
    }

    loadSaves();
</script>
</body>
</html>
