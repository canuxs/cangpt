<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanGPT U1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #0b0b0b; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        #sidebar h2 { color: #4dabf7; font-size: 24px; margin: 0 0 20px 0; }
        .btn-reset { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; transition: 0.3s; }
        #main { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 85%; padding: 12px 20px; border-radius: 15px; line-height: 1.6; font-size: 16px; word-wrap: break-word; }
        .user { align-self: flex-end; background: #222; border: 1px solid #333; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #001a33; color: #99ccff; border: 1px solid #004080; border-bottom-left-radius: 2px; }
        
        /* Kod blokları için stil */
        pre { background: #050505; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #1a1a1a; margin: 10px 0; }
        code { font-family: 'Consolas', monospace; color: #e6edf3; font-size: 14px; }
        p { margin: 5px 0; }

        #input-container { padding: 25px; background: #000; border-top: 1px solid #222; display: flex; gap: 12px; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; outline: none; font-size: 16px; }
        button#send { background: #0066cc; color: #fff; border: none; padding: 0 30px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>CanGPT U1</h2>
    <button class="btn-reset" onclick="location.reload()">Sohbeti Sıfırla</button>
</div>

<div id="main">
    <div id="chat">
        <div class="bubble ai">Selam! Ben CanGPT U1. Size nasıl yardımcı olabilirim?</div>
    </div>
    <div id="input-container">
        <input type="text" id="userInput" placeholder="Bir şeyler yazın..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="send" onclick="sendMessage()">GÖNDER</button>
    </div>
</div>

<script>
    const API_URL = "/chat";

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        addBubble(text, 'user');
        input.value = "";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: text })
            });
            const data = await res.json();
            addBubble(data.text || "Hata: Yanıt alınamadı.", 'ai');
        } catch (err) {
            addBubble("Bağlantı hatası: Sunucu uyanıyor olabilir.", 'ai');
        }
    }

    function addBubble(text, sender) {
        const div = document.createElement("div");
        div.className = `bubble ${sender}`;
        
        // Hata korumalı Markdown işleme
        if (sender === 'ai') {
            try {
                if (typeof marked !== 'undefined') {
                    div.innerHTML = marked.parse(text);
                } else {
                    div.innerText = text; // Kütüphane yüklenmezse düz metin göster
                }
            } catch (e) {
                div.innerText = text;
            }
        } else {
            div.innerText = text;
        }

        const chat = document.getElementById("chat");
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
