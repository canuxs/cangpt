<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanGPT 6.0 | Final</title>
    <style>
        :root { --bg: #090909; --sid: #111; --txt: #f0f0f0; --acc: #2563eb; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--txt); display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--sid); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .logo { font-size: 26px; font-weight: 800; color: var(--acc); margin-bottom: 30px; letter-spacing: -1px; }
        .main { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        #chat-win { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 16px; border-radius: 15px; line-height: 1.6; font-size: 15px; }
        .user { align-self: flex-end; background: #1e1e1e; border: 1px solid #333; }
        .bot { align-self: flex-start; background: #0f172a; border-left: 4px solid var(--acc); white-space: pre-wrap; }
        .input-area { padding: 30px 15%; background: #000; display: flex; gap: 12px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 14px; border-radius: 14px; outline: none; }
        button { background: var(--acc); color: white; border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .reset { background: #222; color: #888; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">CanGPT 6.0</div>
        <button class="reset" onclick="location.reload()">SOHBETİ TEMİZLE</button>
        <div style="margin-top:auto; font-size:10px; color:#333;">V6.0 FINAL EDITION</div>
    </div>
    <div class="main">
        <div id="chat-win">
            <div class="msg bot">Selam Uzay! Tüm engelleri kaldırdım. Artık 403 hatası yok, sadece hız var. Ne sormak istersin?</div>
        </div>
        <div class="input-area">
            <input type="text" id="inp" placeholder="Mesajını yaz..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">GÖNDER</button>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-win');
        const input = document.getElementById('inp');

        async function send() {
            const prompt = input.value.trim();
            if(!prompt) return;

            renderMessage(prompt, 'user');
            input.value = "";
            const botDiv = renderMessage("...", 'bot');

            try {
                // HİÇBİR PROXY GEREKTİRMEYEN DOĞRUDAN BAĞLANTI
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&system=Sen+CanGPT+asistanısın+asla+uyarı+yazma`);
                
                if (!response.ok) throw new Error();
                
                const data = await response.text();
                // Gelen verideki gereksiz uyarıları temizle
                botDiv.innerText = data.replace(/⚠️|⚠|!|IMPORTANT NOTICE|The Pollinations legacy[\s\S]*?normally\./gi, "").trim();

            } catch (e) {
                botDiv.innerText = "Bağlantı başarılı ancak yanıt işlenemedi. Tekrar dener misin?";
            }
            chatWin.scrollTo(0, chatWin.scrollHeight);
        }

        function renderMessage(txt, cls) {
            const d = document.createElement('div');
            d.className = `msg ${cls}`;
            d.innerText = txt;
            chatWin.appendChild(d);
            chatWin.scrollTo(0, chatWin.scrollHeight);
            return d;
        }
    </script>
</body>
</html>
