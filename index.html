<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanGPT 6.0 | Final</title>
    <style>
        :root { --bg: #090909; --sid: #111; --txt: #f0f0f0; --acc: #2563eb; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--txt); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sid); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .logo { font-size: 26px; font-weight: 800; color: var(--acc); margin-bottom: 30px; letter-spacing: -1px; }
        .main { flex: 1; display: flex; flex-direction: column; background: #000; }
        #chat-win { flex: 1; overflow-y: auto; padding: 40px 18%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 16px; border-radius: 15px; line-height: 1.6; font-size: 15px; animation: slide 0.3s ease; word-wrap: break-word; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: #1e1e1e; border: 1px solid #333; }
        .bot { align-self: flex-start; background: #0f172a; border-left: 4px solid var(--acc); white-space: pre-wrap; }
        .input-area { padding: 30px 18%; background: #000; display: flex; gap: 12px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 14px; border-radius: 14px; outline: none; font-size: 15px; }
        button { background: var(--acc); color: white; border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        .error { border-color: #ef4444; color: #f87171; background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">CanGPT 6.0</div>
        <button style="background:#222; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;" onclick="location.reload()">Sohbeti Sıfırla</button>
        <div style="margin-top:auto; font-size:11px; color:#444;">Durum: Canlı & Kesintisiz</div>
    </div>
    <div class="main">
        <div id="chat-win">
            <div class="msg bot">Selam Uzay! Sistemdeki tüm 403 ve proxy engellerini aştık. Şu an en güncel motordasın. Hadi başlayalım!</div>
        </div>
        <div class="input-area">
            <input type="text" id="inp" placeholder="Buraya yazın..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">GÖNDER</button>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-win');
        const input = document.getElementById('inp');

        async function send() {
            const prompt = input.value.trim();
            if(!prompt) return;

            renderMessage(prompt, 'user');
            input.value = "";
            const botDiv = renderMessage("Düşünüyorum...", 'bot');

            try {
                // Rastgele bir seed ekleyerek cache (önbellek) çakışmasını ve 429'u azaltıyoruz
                const seed = Math.floor(Math.random() * 100000);
                const url = `https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&seed=${seed}&system=Sen+CanGPT+asistanısın+asla+uyarı+yazma`;
                
                const response = await fetch(url);
                
                if (response.status === 429) {
                    botDiv.innerText = "Sistem şu an çok yoğun. Lütfen 5-10 saniye sonra tekrar gönderin.";
                    botDiv.classList.add('error');
                    return;
                }

                if (!response.ok) throw new Error();
                
                const text = await response.text();
                botDiv.innerText = text.replace(/⚠️|⚠|!|IMPORTANT NOTICE|The Pollinations legacy[\s\S]*?normally\./gi, "").trim();

            } catch (e) {
                botDiv.innerText = "Küçük bir bağlantı sorunu oluştu, lütfen tekrar deneyin.";
                botDiv.classList.add('error');
            }
            chatWin.scrollTo(0, chatWin.scrollHeight);
        }

        function renderMessage(txt, cls) {
            const d = document.createElement('div');
            d.className = `msg ${cls}`;
            d.innerText = txt;
            chatWin.appendChild(d);
            chatWin.scrollTo(0, chatWin.scrollHeight);
            return d;
        }
    </script>
</body>
</html>
