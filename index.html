<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CanGPT U1</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Yan Menü */
        #sidebar { width: 260px; background: #0b0b0b; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        #sidebar h2 { color: #4dabf7; font-size: 24px; margin-bottom: 20px; }
        .btn-reset { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px; cursor: pointer; border-radius: 5px; }
        .btn-reset:hover { background: #252525; }
        .status { margin-top: auto; font-size: 12px; color: #666; }

        /* Sohbet Alanı */
        #main { flex-grow: 1; display: flex; flex-direction: column; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        
        .bubble { max-width: 75%; padding: 15px; border-radius: 12px; line-height: 1.5; font-size: 16px; }
        .user { align-self: flex-end; background: #222; border: 1px solid #444; }
        .ai { align-self: flex-start; background: #001a33; border: 1px solid #004080; color: #99ccff; }

        /* Giriş Kısmı */
        #input-container { padding: 25px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; outline: none; }
        button#send { background: #0066cc; color: #fff; border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button#send:hover { background: #0052a3; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>CanGPT 6.0</h2>
    <button class="btn-reset" onclick="location.reload()">Sohbeti Sıfırla</button>
    <div class="status">Motor: Llama 3 (70B)<br>Durum: Canlı & Kesintisiz</div>
</div>

<div id="main">
    <div id="chat" id="chatBox">
        <div class="bubble ai">Selam! Tüm bağlantı sorunlarını çözdük. Llama 3 motoru şu an aktif. Ne sormak istersin?</div>
    </div>

    <div id="input-container">
        <input type="text" id="userInput" placeholder="Mesajınızı buraya yazın..." onkeypress="checkEnter(event)">
        <button id="send" onclick="sendMessage()">GÖNDER</button>
    </div>
</div>

<script>
    // BURAYA CLOUDFLARE'DEN ALDIĞIN WORKER URL'SİNİ YAZ
    const API_URL = "https://cold-cake-fdc8.bobthedarek.workers.dev/";

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chat = document.getElementById("chat");
        const prompt = input.value.trim();

        if (!prompt) return;

        // Kullanıcı mesajını ekle
        addBubble(prompt, 'user');
        input.value = "";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await res.json();
            addBubble(data.text || "Hata: Yanıt alınamadı.", 'ai');
        } catch (err) {
            addBubble("Bağlantı koptu. Lütfen internetini veya Worker ayarlarını kontrol et.", 'ai');
        }
    }

    function addBubble(text, sender) {
        const div = document.createElement("div");
        div.className = `bubble ${sender}`;
        div.innerText = text;
        const chat = document.getElementById("chat");
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function checkEnter(e) { if (e.key === "Enter") sendMessage(); }
</script>

</body>
</html>
