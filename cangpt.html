<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanGPT - Sohbet Et</title>
    <meta name="description" content="CanGPT: Can Bartu Biçer tarafından geliştirilen yapay zeka asistanı.">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #0b0b0b; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #sidebar h2 { color: #4dabf7; font-size: 24px; margin-bottom: 10px; }
        .nav-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; transition: 0.3s; text-align: left; font-size: 14px; }
        .nav-btn:hover { background: #252525; border-color: #4dabf7; }
        .btn-red { border-color: #441111; }
        #main { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 85%; padding: 12px 20px; border-radius: 15px; line-height: 1.6; font-size: 16px; position: relative; }
        .user { align-self: flex-end; background: #222; border: 1px solid #333; }
        .ai { align-self: flex-start; background: #001a33; color: #99ccff; border: 1px solid #004080; }
        .gen-image { width: 256px; height: 256px; border-radius: 10px; margin-top: 10px; display: block; background: #111; }
        .dl-btn { display: inline-block; margin-top: 8px; padding: 5px 12px; background: #0066cc; color: #fff; text-decoration: none; border-radius: 5px; font-size: 12px; }
        #input-container { padding: 25px; border-top: 1px solid #222; display: flex; gap: 12px; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; outline: none; }
        button#send { background: #0066cc; color: #fff; border: none; padding: 0 30px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .record-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 8px; border-radius: 5px; border: 1px solid #222; font-size: 12px; }
        .record-actions { display: flex; gap: 5px; }
        .action-icon { cursor: pointer; opacity: 0.6; }
        .action-icon:hover { opacity: 1; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>CanGPT</h2>
    <button class="nav-btn btn-red" onclick="resetChat()">Sohbeti Sıfırla</button>
    <button class="nav-btn" onclick="saveCurrentChat()">Sohbeti Kaydet</button>
    <div style="color: #555; font-size: 12px; margin-top: 10px; font-weight: bold;">KAYITLAR</div>
    <div id="records-list"></div>
</div>

<div id="main">
    <div id="chat">
        <div class="bubble ai">Selam! Size nasıl yardımcı olabilirim?</div>
    </div>
    <div id="input-container">
        <input type="text" id="userInput" placeholder="Bir şeyler yazın..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="send" onclick="sendMessage()">GÖNDER</button>
    </div>
</div>

<script>
    const API_URL = "/chat";
    let chatHistory = [];

    window.onload = loadRecords;

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        addBubble(text, 'user');
        input.value = "";
        chatHistory.push({ role: "user", content: text });

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ history: chatHistory })
            });
            const data = await res.json();
            
            if (data.text) {
                processAIResponse(data.text);
                chatHistory.push({ role: "assistant", content: data.text });
            }
        } catch (err) {
            addBubble("Bağlantı hatası.", 'ai');
        }
    }

    function processAIResponse(text) {
        if (text.includes("GÖRSEL_OLUŞTUR:")) {
            const desc = text.split("GÖRSEL_OLUŞTUR:")[1].trim();
            const cleanText = text.split("GÖRSEL_OLUŞTUR:")[0];
            if(cleanText) addBubble(cleanText, 'ai');
            
            // Görsel API Simülasyonu (Placeholder - Pollinations veya Unsplash kullanılabilir)
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(desc)}?width=256&height=256&seed=${Math.floor(Math.random()*1000)}`;
            addImageBubble(imgUrl, desc);
        } else {
            addBubble(text, 'ai');
        }
    }

    function addBubble(text, sender) {
        const div = document.createElement("div");
        div.className = `bubble ${sender}`;
        div.innerHTML = sender === 'ai' ? marked.parse(text) : text;
        const chat = document.getElementById("chat");
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function addImageBubble(url, desc) {
        const div = document.createElement("div");
        div.className = "bubble ai";
        div.innerHTML = `
            <p>İşte istediğin görsel: <b>${desc}</b></p>
            <img src="${url}" class="gen-image" alt="${desc}">
            <a href="${url}" download="cangpt_${Date.now()}.png" target="_blank" class="dl-btn">📥 PNG İndir</a>
        `;
        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function saveCurrentChat() {
        if (chatHistory.length === 0) return alert("Kaydedilecek bir şey yok!");
        const savedChats = JSON.parse(localStorage.getItem('cangpt_records') || '[]');
        
        let chatName = prompt("Sohbet ismi girin (Aynı isim girilirse üzerine yazılır):");
        if (!chatName) return;

        const existingIndex = savedChats.findIndex(c => c.name === chatName);
        if (existingIndex > -1) {
            savedChats[existingIndex].history = [...chatHistory];
        } else {
            savedChats.push({ name: chatName, history: [...chatHistory] });
        }

        localStorage.setItem('cangpt_records', JSON.stringify(savedChats));
        loadRecords();
        alert("Sohbet kaydedildi!");
    }

    function loadRecords() {
        const list = document.getElementById("records-list");
        const savedChats = JSON.parse(localStorage.getItem('cangpt_records') || '[]');
        list.innerHTML = "";
        savedChats.forEach((chat, index) => {
            const container = document.createElement("div");
            container.className = "record-item";
            container.innerHTML = `
                <span onclick="openRecord(${index})" style="cursor:pointer; overflow:hidden;">📄 ${chat.name}</span>
                <div class="record-actions">
                    <span class="action-icon" onclick="renameRecord(${index})">✏️</span>
                    <span class="action-icon" onclick="deleteRecord(${index})">❌</span>
                </div>
            `;
            list.appendChild(container);
        });
    }

    function deleteRecord(index) {
        if (!confirm("Bu kaydı silmek istediğine emin misin?")) return;
        const savedChats = JSON.parse(localStorage.getItem('cangpt_records') || '[]');
        savedChats.splice(index, 1);
        localStorage.setItem('cangpt_records', JSON.stringify(savedChats));
        loadRecords();
    }

    function renameRecord(index) {
        const savedChats = JSON.parse(localStorage.getItem('cangpt_records') || '[]');
        const newName = prompt("Yeni ismi girin:", savedChats[index].name);
        if (newName) {
            savedChats[index].name = newName;
            localStorage.setItem('cangpt_records', JSON.stringify(savedChats));
            loadRecords();
        }
    }

    function openRecord(index) {
        const savedChats = JSON.parse(localStorage.getItem('cangpt_records') || '[]');
        chatHistory = savedChats[index].history;
        document.getElementById("chat").innerHTML = "";
        chatHistory.forEach(msg => addBubble(msg.content, msg.role === 'user' ? 'user' : 'ai'));
    }

    function resetChat() {
        chatHistory = [];
        document.getElementById("chat").innerHTML = '<div class="bubble ai">Sohbet sıfırlandı.</div>';
    }
</script>
</body>
</html>
